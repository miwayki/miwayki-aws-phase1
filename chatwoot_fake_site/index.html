<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miwayki - Sandbox Chatwoot</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        background: #f5f7fb;
        color: #1b1f2a;
      }
      .card {
        max-width: 760px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        padding: 1.5rem;
      }
      h1 {
        margin-top: 0;
      }
      .hint {
        color: #4a5568;
        line-height: 1.5;
      }
      .badge {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.35rem 0.6rem;
        border-radius: 999px;
        background: #edf2ff;
        color: #2d3a8c;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sandbox local de Chatwoot</h1>
      <p class="hint">
        Esta página es solo para pruebas del flujo completo: widget -> Chatwoot ->
        servicios puente. No toca tu web productiva.
      </p>
      <span class="badge">Modo local / validación de concepto</span>
    </div>

    
  

  <script>
  (function(d,t) {
    var BASE_URL = "http://127.0.0.1:3000";
    var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
    g.src = BASE_URL + "/packs/js/sdk.js";
    g.async = true;
    s.parentNode.insertBefore(g, s);
    g.onload = function() {
      window.chatwootSDK.run({
        websiteToken: "NBP9ivzpzGAwu81AuMQn8tfj",
        baseUrl: BASE_URL
      });
    };
  })(document, "script");
</script>
</body>
</html>
